<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body>
    Name <input type="text" id="name"><br><br>
    Price <input type="text" id="price"><br><br>
    Qty <input type="text" id="qty"><br><br>
    <button id="btn">click me</button>
    <br><br>
    <table border="1" id="table">
        <thead>
            <tr>
                <th>Sno</th>
                <th>Name</th>
                <th>Price</th>
                <th>Quantity</th>
            </tr>
        </thead>
        <tbody>

        </tbody>
    </table>

    <script>
        $('input[type="text"]').css('background-color', 'yellow')    //jquery for styling

        // $("#btn").click(()=>{                    //jquery for event management
        //     console.log("click")
        //     alert('Item Added Successfully')
        // })

        $("#btn").click(() => {
            let count = $("table tbody tr").length += 1;
            let name = $("#name").val()
            let price = $("#price").val()
            let qty = $("#qty").val()
            if (count % 2 != 0) {
                $('table tbody tr').css('background-color', 'cyan')    //jquery for styling
            } else {
                $('table tbody tr').css('background-color', 'green')    //jquery for styling
            }
            let row = `<tr>
                <td>${count}</td>
                <td>${name}</td>
                <td>${price}</td>
                <td>${qty}</td>
                </tr>`
            $('#table tbody').append(row)
        })

    </script>
</body>

</html>
